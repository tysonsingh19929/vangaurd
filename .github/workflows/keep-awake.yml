name: Keep Render Instance Awake

on:
  schedule:
    # Runs every 10 minutes to prevent Render free-tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual run from GitHub Actions tab

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Live Server
        run: |
          curl -I -s https://vangaurd-9cs6.onrender.com/
